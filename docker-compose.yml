services:
  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    environment:
      APP_PORT: 8080
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-https://localhost:3000}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://localhost:3000}
      STUN_URL: ${STUN_URL:-stun:stun.l.google.com:19302}
      TURN_URL: ${TURN_URL:-turn:localhost:3478?transport=udp}
      TURN_USERNAME: ${TURN_USERNAME:-webrtc}
      TURN_PASSWORD: ${TURN_PASSWORD:-webrtc-secret}
      SESSION_EMPTY_GRACE_SECONDS: ${SESSION_EMPTY_GRACE_SECONDS:-10}
      SESSION_RETENTION_SECONDS: ${SESSION_RETENTION_SECONDS:-300}
      SESSION_MAX_AGE_HOURS: ${SESSION_MAX_AGE_HOURS:-24}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      - coturn

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_PUBLIC_APP_URL: ${VITE_PUBLIC_APP_URL:-}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-}
    ports:
      - "${WEB_PORT:-3000}:80"
    volumes:
      - ./apps/web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/https/certs:/etc/nginx/certs:ro
    depends_on:
      - server

  coturn:
    image: coturn/coturn:latest
    command:
      - -c
      - /etc/coturn/turnserver.conf
    ports:
      - "${TURN_PORT:-3478}:3478"
      - "${TURN_PORT:-3478}:3478/udp"
    volumes:
      - ./infra/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
