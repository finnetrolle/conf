# docker-compose generates the live coturn config from environment variables.
# Keep this file as a reference for bare-metal deployments.

listening-port=3478
realm=conf.local
fingerprint
lt-cred-mech
use-auth-secret
static-auth-secret=<TURN_AUTH_SECRET>
no-cli
no-tls
no-dtls
min-port=49160
max-port=49200
